name: Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to Tencent Lighthouse
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.TENCENT_LIGHTHOUSE_HOST }}
          username: ${{ secrets.TENCENT_LIGHTHOUSE_USER }}
          key: ${{ secrets.TENCENT_LIGHTHOUSE_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull --ff-only
            corepack enable
            corepack pnpm install --frozen-lockfile
            corepack pnpm --filter @aquarium/api prisma:migrate:deploy
            docker compose up -d --build api caddy
